product:
  type: kmp/lib
  platforms: [ jvm, android, iosArm64, iosSimulatorArm64]

dependencies:
  - $compose.foundation: exported
  - org.jetbrains.compose.material3:material3:1.11.0-alpha07
  - bom: io.github.jan-tennert.supabase:bom:3.6.0
  - io.github.jan-tennert.supabase:postgrest-kt
  - io.github.jan-tennert.supabase:auth-kt
  - io.github.jan-tennert.supabase:compose-auth
  - bom: io.insert-koin:koin-bom:4.2.1
  - io.insert-koin:koin-core
  - io.insert-koin:koin-compose
  - io.insert-koin:koin-compose-viewmodel
  - io.insert-koin:koin-core-viewmodel
  - io.insert-koin:koin-annotations
  - org.jetbrains.androidx.navigation3:navigation3-ui:1.0.0-alpha05
  - org.jetbrains.androidx.lifecycle:lifecycle-viewmodel-navigation3:2.10.0-alpha05
  - io.github.mirzemehdi:kmpauth-google:2.5.0-alpha01
  - org.jetbrains.compose.material:material-icons-extended:1.7.3
  - io.coil-kt.coil3:coil-compose:3.0.0-alpha10
  - io.coil-kt.coil3:coil-network-ktor3:3.0.0-alpha10
  - androidx.room:room-runtime:2.8.4
  - androidx.sqlite:sqlite-bundled:2.6.2
  - org.jetbrains.kotlinx:kotlinx-coroutines-core:1.10.1


dependencies@android:
  - io.insert-koin:koin-android
  - $ktor.client.okhttp

dependencies@jvm:
  - $ktor.client.cio

settings:
  compose:
    enabled: true
    version: 1.11.1
  kotlin:
    serialization: json
    version: 2.3.21
    ksp:
      processors:
        - androidx.room:room-compiler:2.8.4
      processorOptions:
        room.schemaLocation: ./schema
    compilerPlugins:
      - id: io.insert-koin.compiler.plugin
        dependency: io.insert-koin:koin-compiler-plugin:1.0.0
    optIns: [ androidx.compose.material3.ExperimentalMaterial3ExpressiveApi ]
  ktor: enabled


plugins:
  build-config:
    enabled: true
    propertiesFileName: config
    buildType: "debug"



