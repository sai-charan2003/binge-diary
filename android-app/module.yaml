product: android/app

dependencies:
  - ../shared
  - androidx.activity:activity-compose:1.7.2
  - bom: io.insert-koin:koin-bom:4.2.1
  - io.insert-koin:koin-android
  - androidx.core:core-splashscreen:1.2.0

settings:
  compose: enabled
  junit: junit-4
  android:
    applicationId: com.charan.bingediary
    namespace: com.charan.bingediary
    minSdk: 24
    signing:
      enabled: true
      propertiesFile: keystore.properties
  kotlin:
    compilerPlugins:
      - id: io.insert-koin.compiler.plugin
        dependency: io.insert-koin:koin-compiler-plugin:1.0.0