name: Release Android App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Grant execute permission for Kotlin build tool and script
        run: |
          chmod +x ./kotlin
          chmod +x ./build.sh

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$ENCODED_KEYSTORE" | base64 --decode > android-app/release.keystore

      - name: Create keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "storeFile=release.keystore" > android-app/keystore.properties
          echo "storePassword=$KEYSTORE_PASSWORD" >> android-app/keystore.properties
          echo "keyAlias=$KEY_ALIAS" >> android-app/keystore.properties
          echo "keyPassword=$KEY_PASSWORD" >> android-app/keystore.properties

      - name: Create config-release.properties
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID" > shared/config-release.properties
          echo "TMDB_API_KEY=$TMDB_API_KEY" >> shared/config-release.properties
          echo "SUPABASE_URL=$SUPABASE_URL" >> shared/config-release.properties
          echo "SUPABASE_KEY=$SUPABASE_KEY" >> shared/config-release.properties

      - name: Build Release APK & AAR
        run: ./build.sh release

      - name: Upload AAR Artifact to Actions
        uses: actions/upload-artifact@v4
        with:
          name: binge-diary-release-aar
          path: android-app/release/binge-diary-release.aar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-app/release/binge-diary-release.apk
          generate_release_notes: false
